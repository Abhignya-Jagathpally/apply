# ATS boards to poll (company slugs)
# Only keep confirmed-valid ATS tenants. Unknown slugs 404 and waste a request.
greenhouse_slugs:
  [scaleai, pinterest, samsungsemiconductor, stripe, airbnb, databricks,
   anthropic, instacart, robinhood, affirm, figma, duolingo, discord, dropbox]

lever_slugs: [spotify, kraken]

# Add real tenant slugs as you discover them. Unknown slugs 404 and are logged.
ashby_slugs:         [openai, ramp, notion, linear, posthog, deel]
workable_slugs:      []  # add verified tenant slugs only — drive-by guesses 404

smartrecruiters_slugs: [bosch, visa, sap, tesco]
breezy_slugs:        []

# Dallas-area cities (substring match, case-insensitive)
dallas_area:
  - dallas
  - fort worth
  - plano
  - frisco
  - irving
  - arlington
  - richardson
  - addison
  - mckinney
  - allen
  - carrollton
  - garland
  - grapevine
  - lewisville
  - las colinas
  - dfw

# Title must include at least one from each list
title_positive_domain:
  [data, ml, ai, machine learning, analytics, analyst, scientist, research, deep learning, nlp, computer vision]
title_positive_role:
  [intern, internship, co-op, coop, " i ", " i,"]   # internships only

# Title must NOT match any of these
title_negative:
  [senior, staff, principal, lead, sr., manager, director, vp,
   sales, marketing, recruiter, hr,
   accounting, tax, audit, legal]

apply:
  dry_run: true          # set false (or env APPLY_DRY_RUN=0) to actually submit
  max_per_run: 100
  skip_if_asks_for:      # required free-text fields that should cause a skip
    - github url
    - portfolio url
    - personal website
