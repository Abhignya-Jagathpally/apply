# ATS boards to poll (company slugs)
greenhouse_slugs:
  [samsungsemiconductor, scaleai, pinterest, doordash, rivian, tesla, atlassian,
   capitalone, experian, nvidia, meriton, rebelathletic, abcfitness, conifer]

lever_slugs: [bhg, catalystbrands]

# Dallas-area cities (substring match, case-insensitive)
dallas_area:
  - dallas
  - fort worth
  - plano
  - frisco
  - irving
  - arlington
  - richardson
  - addison
  - mckinney
  - allen
  - carrollton
  - garland
  - grapevine
  - lewisville
  - las colinas
  - dfw

# Title must include at least one from each list
title_positive_domain:
  [data, ml, ai, machine learning, analytics, analyst, scientist, research, deep learning, nlp, computer vision]
title_positive_role:
  [intern, internship, co-op, coop]

# Title must NOT match any of these
title_negative:
  [senior, staff, principal, lead, sr., manager, director, vp,
   sales, marketing, recruiter, hr,
   accounting, tax, audit, legal]

apply:
  dry_run: true          # set false (or env APPLY_DRY_RUN=0) to actually submit
  max_per_run: 25
  skip_if_asks_for:      # required free-text fields that should cause a skip
    - github url
    - portfolio url
    - personal website
