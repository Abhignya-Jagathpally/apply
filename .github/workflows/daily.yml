name: daily-apply

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LINKEDIN_STATE_JSON: ${{ secrets.LINKEDIN_STATE_JSON }}
      APPLY_DRY_RUN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - run: python run.py
      - name: Commit logs
        if: always()
        run: |
          git config user.name  "apply-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/applied.jsonl data/jobs.jsonl data/matched.jsonl || true
          git diff --cached --quiet || git commit -m "daily run logs"
          git push || true
