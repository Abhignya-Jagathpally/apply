name: daily-apply

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LINKEDIN_STATE_JSON: ${{ secrets.LINKEDIN_STATE_JSON }}
      APPLY_DRY_RUN: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - run: python run.py
      - name: Commit logs
        if: always()
        run: |
          git config user.name  "apply-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/applied.jsonl data/jobs.jsonl data/matched.jsonl || true
          git diff --cached --quiet || git commit -m "daily run logs"
          git push || true

  use-anthropic:
    runs-on: ubuntu-latest
    steps:
      - name: Call Anthropic API
        run: |
          curl https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "claude-3-5-sonnet-20240620",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": "Hello, world"}]
            }'



